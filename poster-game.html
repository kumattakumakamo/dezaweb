<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
    <title>情報デザインコース 特設サイト</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent
        }

        html,
        body {
            height: 100%;
            background: #F1EFE8;
            font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Meiryo', sans-serif;
            color: #2C2C2A
        }

        #app {
            max-width: 390px;
            margin: 0 auto;
            min-height: 100vh;
            background: #FAF8F3;
            display: flex;
            flex-direction: column
        }

        /* header */
        .hdr {
            position: sticky;
            top: 0;
            z-index: 20;
            background: rgba(250, 248, 243, 0.96);
            border-bottom: 1.5px solid #2C2C2A;
            padding: 12px 16px
        }

        .hdr-title {
            font-size: 13px;
            font-weight: 700
        }

        /* skip */
        .skip-btn {
            position: fixed;
            bottom: 24px;
            right: 20px;
            z-index: 50;
            background: rgba(44, 44, 42, 0.08);
            border: 1.5px solid rgba(44, 44, 42, 0.18);
            border-radius: 20px;
            padding: 7px 14px;
            font-size: 11px;
            font-weight: 600;
            color: #888780;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 0.04em;
            backdrop-filter: blur(4px);
        }

        /* nudge */
        .nudge {
            padding: 20px 20px 8px;
            text-align: center;
            font-size: 16px;
            font-weight: 700;
            color: #2C2C2A;
            line-height: 1.5;
        }

        /* poster frame */
        .poster-wrap {
            display: flex;
            justify-content: center;
            padding: 8px 16px 0;
            position: relative
        }

        .poster {
            width: 272px;
            height: 368px;
            background: #fff;
            border: 2px solid #2C2C2A;
            position: relative;
            overflow: hidden;
            box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.12);
        }

        .poster-label {
            position: absolute;
            top: -10px;
            left: 12px;
            font-size: 9px;
            color: #888780;
            background: #FAF8F3;
            padding: 0 4px
        }

        .frame {
            position: absolute;
            border: 1.5px dashed #C0C0B8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow: hidden;
            transition: border-color 0.1s, background 0.1s;
        }

        .frame[data-sz=large] {
            inset: 0;
            z-index: 1
        }

        .frame[data-sz=medium] {
            left: 50%;
            transform: translateX(-50%);
            bottom: 54px;
            width: 196px;
            height: 100px;
            z-index: 2;
        }

        .frame[data-sz=small] {
            right: 12px;
            bottom: 12px;
            width: 66px;
            height: 40px;
            z-index: 3
        }

        .frame.over {
            border-color: #2C2C2A;
            border-style: solid;
            background: rgba(159, 225, 203, 0.22)
        }

        .frame.filled {
            border-style: solid;
            border-color: #2C2C2A
        }

        .ph {
            font-size: 9px;
            color: #C0C0B8;
            text-align: center;
            pointer-events: none;
            user-select: none;
            padding: 4px
        }

        .fc {
            position: absolute;
            inset: 0;
            padding: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            pointer-events: none;
            user-select: none
        }

        /* medium frame: title fixed + chip */
        .title-fixed {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4px 4px 2px;
            text-align: center;
            border-bottom: 1px solid rgba(44, 44, 42, 0.15);
            width: 100%
        }

        .tf-label {
            font-size: 6px;
            color: #888780;
            letter-spacing: 0.1em;
            margin-bottom: 2px
        }

        .tf-text {
            font-size: 7px;
            font-weight: 700;
            line-height: 1.4;
            color: #2C2C2A
        }

        .ph-under {
            font-size: 8px;
            color: #C0C0B8;
            text-align: center;
            padding: 4px;
            pointer-events: none;
            user-select: none;
            width: 100%
        }

        .medium-chip {
            position: relative;
            inset: auto;
            padding: 2px;
            justify-content: flex-start;
            align-items: flex-start
        }

        /* chips */
        .chips {
            display: flex;
            gap: 14px;
            padding: 14px 20px 16px;
            align-items: center;
            justify-content: center
        }

        .chip {
            padding: 10px 12px;
            background: #fff;
            box-shadow: 2px 3px 8px rgba(0, 0, 0, 0.15);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            touch-action: none;
            user-select: none;
            font-size: 11px;
            font-weight: 600;
            color: #2C2C2A;
            transition: opacity 0.2s, transform 0.15s;
            white-space: nowrap;
        }

        .chip:active {
            cursor: grabbing;
            transform: scale(1.04) rotate(1deg)
        }

        .chip.placed {
            opacity: 0.2;
            pointer-events: none;
            box-shadow: none
        }

        .ce0 {
            transform: rotate(-2deg)
        }

        .ce1 {
            transform: rotate(1deg)
        }

        .ce2 {
            transform: rotate(-1deg)
        }

        /* frame content */
        .t-lg {
            font-size: 13px;
            font-weight: 700;
            line-height: 1.5;
            text-align: center
        }

        .t-md {
            font-size: 10px;
            font-weight: 700;
            line-height: 1.5;
            text-align: center
        }

        .t-sm {
            font-size: 8.5px;
            font-weight: 700;
            text-align: center;
            line-height: 1.4
        }

        .sub {
            font-size: 8px;
            color: #5F5E5A;
            margin-top: 4px;
            line-height: 1.5;
            text-align: center
        }

        /* finger icon hint */
        .drag-hint {
            position: absolute;
            left: 50%;
            bottom: 20px;
            transform: translateX(-50%);
            font-size: 28px;
            pointer-events: none;
            z-index: 100;
            animation: dragHintAnim 1.1s ease forwards;
        }

        @keyframes dragHintAnim {
            0% {
                opacity: 0;
                transform: translateX(-50%) translate(0, 0)
            }

            15% {
                opacity: 1;
                transform: translateX(-50%) translate(0, 0)
            }

            75% {
                opacity: 1;
                transform: translateX(-50%) translate(10px, -90px)
            }

            100% {
                opacity: 0;
                transform: translateX(-50%) translate(10px, -90px)
            }
        }

        /* ghost */
        #ghost {
            position: fixed;
            pointer-events: none;
            z-index: 999;
            display: none;
            opacity: 0.88;
            transform: scale(1.06) rotate(2deg)
        }

        #ghost.on {
            display: flex
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="hdr">
            <span class="hdr-title">情報デザインコース 特設サイト</span>
        </div>
        <div style="display:flex;flex:1;flex-direction:column">
            <div class="nudge">ブロックを好きな位置に配置してみよう</div>
            <div class="poster-wrap" id="poster-wrap">
                <div class="poster" id="poster">
                    <span class="poster-label">情報デザインコース 特設サイト</span>
                    <div class="frame" data-sz="large" id="f-large">
                        <div class="ph" style="opacity:0.35;font-size:9px">背景</div>
                    </div>
                    <div class="frame" data-sz="medium" id="f-medium">
                        <div class="title-fixed">
                            <div class="tf-label">TITLE</div>
                            <div class="tf-text">未来大<br>情報デザインコース<br>特設サイト</div>
                        </div>
                        <div class="ph ph-under">ここにドロップ</div>
                    </div>
                    <div class="frame" data-sz="small" id="f-small">
                        <div class="ph" style="font-size:8px">角</div>
                    </div>
                </div>
                <div class="drag-hint" id="drag-hint">☝️</div>
            </div>
            <div class="chips">
                <div class="chip ce0" id="c-fun" data-el="fun">デザインって楽しい</div>
                <div class="chip ce1" id="c-what" data-el="what">デザインとは何か</div>
                <div class="chip ce2" id="c-oc" data-el="oc">オープンキャンパスへ</div>
            </div>
        </div>
    </div>

    <button class="skip-btn" id="skip-btn">スキップ</button>
    <div id="ghost"></div>

    <script>
        const TOP_URL = './index.html';

        const ELEMS = {
            fun: {
                chipId: 'c-fun', bg: '#FAC775',
                content: {
                    large: `<div class="t-lg">デザインって<br>楽しい</div><div class="sub">つくること、伝えること、<br>驚かせること。全部デザイン。</div>`,
                    medium: `<div class="t-md">デザインって楽しい</div><div class="sub">つくるって楽しい。</div>`,
                    small: `<div class="t-sm">デザインって<br>楽しい</div>`,
                }
            },
            what: {
                chipId: 'c-what', bg: '#CECBF6',
                content: {
                    large: `<div class="t-lg">デザインとは<br>何か</div><div class="sub">情報を整理して、伝わる形にする。<br>それがデザインのしごとです。</div>`,
                    medium: `<div class="t-md">デザインとは何か</div><div class="sub">伝わる形にすること。</div>`,
                    small: `<div class="t-sm">デザインとは<br>何か</div>`,
                }
            },
            oc: {
                chipId: 'c-oc', bg: '#9FE1CB',
                content: {
                    large: `<div class="t-lg">8/3<br>オープン<br>キャンパスへ</div><div class="sub">情報デザインコースで<br>実際に話を聞いてみよう。</div>`,
                    medium: `<div class="t-md">8/3<br>オープンキャンパスへ</div><div class="sub">話を聞きに来てね。</div>`,
                    small: `<div class="t-sm">8/3<br>OC へ</div>`,
                }
            }
        };

        // 指ヒントは1秒後に確実に消す
        setTimeout(() => {
            const h = document.getElementById('drag-hint');
            if (h) h.style.display = 'none';
        }, 1200);

        /* ── State ── */
        let placed = { large: null, medium: null, small: null };
        let dragging = null;
        let dragOX = 0, dragOY = 0;
        let captorEl = null;

        /* ── Utils ── */
        const ghost = document.getElementById('ghost');
        const chipEl = k => document.getElementById(ELEMS[k].chipId);
        const frameEl = sz => document.getElementById(`f-${sz}`);
        const PH = {};
        ['large', 'small'].forEach(sz => { PH[sz] = frameEl(sz).innerHTML; });
        const MEDIUM_TITLE = `<div class="title-fixed"><div class="tf-label">TITLE</div><div class="tf-text">未来大<br>情報デザインコース<br>特設サイト</div></div>`;

        function frameAtPoint(x, y) {
            for (const sz of ['small', 'medium', 'large']) {
                const f = frameEl(sz);
                const r = f.getBoundingClientRect();
                if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return f;
            }
            return null;
        }

        function placedCount() { return Object.values(placed).filter(Boolean).length; }

        function checkComplete() {
            if (placedCount() === 3) {
                // 全配置完了 → レイアウト保存してTOPへ
                try { localStorage.setItem('poster_layout', JSON.stringify(placed)); } catch (e) { }
                const layoutStr = JSON.stringify(placed);
                window.location.href = TOP_URL + '#layout=' + encodeURIComponent(layoutStr);
            }
        }

        /* ── Frame render ── */
        function renderFrame(sz, elKey) {
            const f = frameEl(sz);
            if (sz === 'medium') {
                f.style.background = elKey ? ELEMS[elKey].bg + '25' : '';
                if (elKey) {
                    f.classList.add('filled');
                    f.innerHTML = `${MEDIUM_TITLE}<div class="fc medium-chip">${ELEMS[elKey].content[sz]}</div>`;
                } else {
                    f.classList.remove('filled');
                    f.innerHTML = `${MEDIUM_TITLE}<div class="ph ph-under">ここにドロップ</div>`;
                }
                return;
            }
            if (!elKey) {
                f.classList.remove('filled'); f.style.background = '';
                f.innerHTML = PH[sz];
                return;
            }
            f.classList.add('filled');
            f.style.background = ELEMS[elKey].bg + (sz === 'large' ? '60' : '35');
            f.innerHTML = `<div class="fc">${ELEMS[elKey].content[sz]}</div>`;
        }

        /* ── Drag ── */
        function beginDrag(elKey, anchorEl, px, py) {
            dragging = elKey;
            const r = anchorEl.getBoundingClientRect();
            dragOX = px - r.left; dragOY = py - r.top;
            const e = ELEMS[elKey];
            ghost.innerHTML = `<div class="chip" style="width:${anchorEl.offsetWidth}px;cursor:grabbing;background:#fff;box-shadow:2px 3px 8px rgba(0,0,0,0.15);padding:10px 12px;font-size:11px;font-weight:600"><span>${e.content.small.replace(/<[^>]+>/g, ' ').trim() || elKey}</span></div>`;
            // ghost shows chip label
            ghost.innerHTML = `<div style="background:#fff;box-shadow:2px 3px 8px rgba(0,0,0,0.15);padding:10px 12px;font-size:11px;font-weight:600;cursor:grabbing;white-space:nowrap">${elKey === 'fun' ? 'デザインって楽しい' : elKey === 'what' ? 'デザインとは何か' : 'オープンキャンパスへ'
                }</div>`;
            ghost.style.left = (px - dragOX) + 'px';
            ghost.style.top = (py - dragOY) + 'px';
            ghost.classList.add('on');
        }

        document.addEventListener('pointermove', e => {
            if (!dragging) return;
            e.preventDefault();
            ghost.style.left = (e.clientX - dragOX) + 'px';
            ghost.style.top = (e.clientY - dragOY) + 'px';
            document.querySelectorAll('.frame').forEach(f => f.classList.remove('over'));
            const hit = frameAtPoint(e.clientX, e.clientY);
            if (hit) hit.classList.add('over');
        }, { passive: false });

        document.addEventListener('pointerup', e => {
            if (!dragging) return;
            document.querySelectorAll('.frame').forEach(f => f.classList.remove('over'));
            ghost.classList.remove('on');
            const hit = frameAtPoint(e.clientX, e.clientY);
            const key = dragging; dragging = null;
            if (captorEl) { try { captorEl.releasePointerCapture(e.pointerId); } catch (_) { } captorEl = null; }
            chipEl(key).style.opacity = '';

            if (hit) {
                const sz = hit.dataset.sz;
                if (placed[sz] && placed[sz] !== key) chipEl(placed[sz]).classList.remove('placed');
                for (const s of ['large', 'medium', 'small']) {
                    if (placed[s] === key) { placed[s] = null; renderFrame(s, null); }
                }
                placed[sz] = key;
                renderFrame(sz, key);
                chipEl(key).classList.add('placed');
                checkComplete();
            } else {
                for (const s of ['large', 'medium', 'small']) {
                    if (placed[s] === key) { placed[s] = null; renderFrame(s, null); }
                }
                chipEl(key).classList.remove('placed');
            }
        });

        document.addEventListener('pointercancel', e => {
            if (!dragging) return;
            document.querySelectorAll('.frame').forEach(f => f.classList.remove('over'));
            ghost.classList.remove('on');
            chipEl(dragging).style.opacity = '';
            dragging = null;
            if (captorEl) { try { captorEl.releasePointerCapture(e.pointerId); } catch (_) { } captorEl = null; }
        });

        /* ── Chip pointerdown ── */
        document.querySelectorAll('.chip').forEach(chip => {
            chip.addEventListener('pointerdown', e => {
                if (chip.classList.contains('placed')) return;
                e.preventDefault();
                try { chip.setPointerCapture(e.pointerId); captorEl = chip; } catch (_) { }
                chip.style.opacity = '0.35';
                beginDrag(chip.dataset.el, chip, e.clientX, e.clientY);
            });
        });

        /* ── Re-drag from frame ── */
        document.querySelectorAll('.frame').forEach(frame => {
            frame.addEventListener('pointerdown', e => {
                const sz = frame.dataset.sz;
                if (!placed[sz]) return;
                e.preventDefault();
                const key = placed[sz];
                placed[sz] = null; renderFrame(sz, null);
                chipEl(key).classList.remove('placed');
                try { frame.setPointerCapture(e.pointerId); captorEl = frame; } catch (_) { }
                beginDrag(key, frame, e.clientX, e.clientY);
            });
        });

        /* ── Skip ── */
        document.getElementById('skip-btn').addEventListener('click', () => {
            window.location.href = TOP_URL;
        });
    </script>
</body>

</html>
